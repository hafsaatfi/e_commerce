{% extends 'base.html' %}

{% block content %}
<div class="row g-4">
    <div class="col-md-5">
        {% if produit.image %}
            <img src="{{ produit.image.url }}" class="img-fluid rounded" alt="{{ produit.nom }}">
        {% else %}
            <div class="border rounded p-5 text-center text-muted">Aucune image</div>
        {% endif %}
    </div>

    <div class="col-md-7">
        <h2>{{ produit.nom }}</h2>
        <p class="text-muted">Categorie: {{ produit.categorie.nom }}</p>
        <p class="fs-4 fw-bold">{{ produit.prix }} DH</p>
        <p>Stock disponible: {{ produit.stock }}</p>
        <p>{{ produit.description }}</p>

        <div class="d-flex gap-2 mt-3">
            <a href="{% url 'produit:modifier_produit' produit.id %}" class="btn btn-warning">Modifier</a>
            <a href="{% url 'produit:supprimer_produit' produit.id %}" class="btn btn-danger">Supprimer</a>
            <a href="{% url 'produit:liste_produits' %}" class="btn btn-secondary">Retour</a>
        </div>
    </div>
</div>
{% endblock %}
