<!-- Floating Chatbot Widget -->
<style>
    /* ========== FLOATING BUTTON STYLES ========== */
    .floating-chat-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(135deg, #f8bbd0 0%, #e1bee7 100%);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 12px 30px rgba(214, 51, 132, 0.25);
        z-index: 9998;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        outline: none;
    }

    .floating-chat-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 16px 40px rgba(214, 51, 132, 0.3);
    }

    .floating-chat-btn:active {
        transform: scale(0.95);
    }

    .floating-chat-btn.open {
        background: linear-gradient(135deg, #e1bee7 0%, #f8bbd0 100%);
    }

    /* ========== CHAT POPUP STYLES ========== */
    .floating-chat-popup {
        position: fixed;
        bottom: 90px;
        right: 20px;
        width: 420px;
        height: 600px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(21, 21, 21, 0.25);
        display: none;
        flex-direction: column;
        z-index: 9999;
        overflow: hidden;
        animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .floating-chat-popup.open {
        display: flex;
    }

    .floating-chat-popup.closing {
        animation: slideDown 0.3s ease;
    }

    /* ========== HEADER ========== */
    .floating-chat-header {
        background: linear-gradient(135deg, #f8bbd0 0%, #e1bee7 100%);
        color: #ffffff;
        padding: 20px;
        border-bottom: 1px solid #e3e3de;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
    }

    .floating-chat-header h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        font-family: 'Manrope', 'Segoe UI', sans-serif;
        letter-spacing: -0.5px;
        color: #ffffff;
    }

    .floating-chat-header .close-btn {
        background: none;
        border: none;
        color: #ffffff;
        font-size: 24px;
        cursor: pointer;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
    }

    .floating-chat-header .close-btn:hover {
        transform: rotate(90deg);
    }

    /* ========== MESSAGES CONTAINER ========== */
    .floating-chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: linear-gradient(120deg, #ffe4ec 0%, #f3e6fa 100%);
        scroll-behavior: smooth;
        font-family: 'Manrope', 'Segoe UI', sans-serif;
    }

    .floating-chat-messages::-webkit-scrollbar {
        width: 6px;
    }

    .floating-chat-messages::-webkit-scrollbar-track {
        background: transparent;
    }

    .floating-chat-messages::-webkit-scrollbar-thumb {
        background: #d63384;
        border-radius: 3px;
    }

    .floating-chat-messages::-webkit-scrollbar-thumb:hover {
        background: #a64ca6;
    }

    /* ========== MESSAGE ROWS ========== */
    .floating-msg-row {
        display: flex;
        margin-bottom: 14px;
        animation: fadeInUp 0.3s ease;
    }

    .floating-msg-row.user {
        justify-content: flex-end;
    }

    .floating-msg-row.bot {
        justify-content: flex-start;
    }

    /* ========== BUBBLES ========== */
    .floating-bubble {
        max-width: 75%;
        padding: 11px 14px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.5;
        word-break: break-word;
        white-space: pre-wrap;
    }

    .floating-bubble.user {
        background: linear-gradient(90deg, #f8bbd0 0%, #e1bee7 100%);
        color: #ffffff;
        border: 1px solid #e0b3d6;
        border-bottom-right-radius: 4px;
        box-shadow: 0 4px 8px rgba(18, 18, 18, 0.05);
    }

    .floating-bubble.bot {
        background: #ffffff;
        color: #a64ca6;
        border: 1px solid #f1d4e8;
        border-bottom-left-radius: 4px;
        box-shadow: 0 4px 8px rgba(18, 18, 18, 0.04);
    }

    /* ========== EMPTY STATE ========== */
    .floating-chat-empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        text-align: center;
        color: #737373;
    }

    .floating-chat-empty-icon {
        font-size: 2.5rem;
        margin-bottom: 12px;
        opacity: 0.8;
    }

    .floating-chat-empty h4 {
        margin: 0 0 8px 0;
        color: #d63384;
        font-weight: 800;
        font-size: 15px;
    }

    .floating-chat-empty p {
        margin: 0;
        font-size: 12px;
        max-width: 85%;
    }

    /* ========== INPUT AREA ========== */
    .floating-chat-footer {
        border-top: 1px solid #e3e3de;
        background: #ffffff;
        padding: 12px;
        display: flex;
        gap: 10px;
        flex-shrink: 0;
    }

    .floating-chat-input {
        flex: 1;
        border: 1px solid #e3e3de;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 13px;
        font-family: inherit;
        background: #f8f8f5;
        color: #151515;
        resize: none;
        max-height: 100px;
        outline: none;
        transition: all 0.2s;
    }

    .floating-chat-input::placeholder {
        color: #a8a8a3;
    }

    .floating-chat-input:focus {
        border-color: #e1bee7;
        box-shadow: 0 0 0 3px rgba(214, 51, 132, 0.12);
        background: #ffffff;
    }

    .floating-send-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #f8bbd0 0%, #e1bee7 100%);
        color: #ffffff;
        font-weight: 800;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s;
        outline: none;
    }

    .floating-send-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(214, 51, 132, 0.24);
    }

    .floating-send-btn:active {
        transform: translateY(0);
    }

    .floating-send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    /* ========== ANIMATIONS ========== */
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    @keyframes slideDown {
        from {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        to {
            opacity: 0;
            transform: translateY(20px) scale(0.95);
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(8px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ========== LOADING STATE ========== */
    .floating-send-btn.loading {
        pointer-events: none;
        opacity: 0.7;
    }

    .floating-send-btn.loading::after {
        content: '';
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        margin-left: 6px;
        background: currentColor;
        animation: blink 1.4s infinite;
    }

    @keyframes blink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 480px) {
        .floating-chat-popup {
            width: 100%;
            height: 100%;
            bottom: 0;
            right: 0;
            border-radius: 0;
        }

        .floating-bubble {
            max-width: 85%;
        }

        .floating-chat-btn {
            width: 56px;
            height: 56px;
        }
    }

    @media (max-width: 600px) {
        .floating-chat-btn {
            bottom: 20px;
            right: 20px;
        }

        .floating-chat-popup {
            width: calc(100vw - 20px);
            max-width: 420px;
            bottom: 80px;
            right: 10px;
        }
    }
</style>

<!-- Floating Chat Widget HTML -->
<!-- Bouton flottant retiré (annulé) comme demandé -->

<div class="floating-chat-popup" id="floatingChatPopup">
    <!-- Header -->
    <div class="floating-chat-header">
        <h3>💬 Assistant Skincare</h3>
        <button class="close-btn" id="closeFloatingChat">×</button>
    </div>

    <!-- Messages Area -->
    <div class="floating-chat-messages" id="floatingChatMessages">
    </div>

    <!-- Input Area -->
    <div class="floating-chat-footer">
        <textarea 
            class="floating-chat-input" 
            id="floatingChatInput"
            placeholder="Écris ton message..."
            rows="1"
        ></textarea>
        <button class="floating-send-btn" id="floatingSendBtn">→</button>
    </div>
</div>

<script>
    // ========== FLOATING CHATBOT WIDGET ========== 
    class FloatingChatbot {
        constructor() {
            this.btn = document.getElementById('floatingChatBtn');
            this.popup = document.getElementById('floatingChatPopup');
            this.closeBtn = document.getElementById('closeFloatingChat');
            this.messagesContainer = document.getElementById('floatingChatMessages');
            this.input = document.getElementById('floatingChatInput');
            this.sendBtn = document.getElementById('floatingSendBtn');
            this.isOpen = false;
            this.chatHistory = [];

            this.init();
        }

        init() {
            // Event listeners
            if (this.btn) {
                this.btn.addEventListener('click', () => this.toggle());
            }
            this.closeBtn.addEventListener('click', () => this.close());
            this.sendBtn.addEventListener('click', () => this.sendMessage());
            this.input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    this.sendMessage();
                }
            });

            // Auto-resize textarea
            this.input.addEventListener('input', () => this.resizeTextarea());
        }

        toggle() {
            if (this.isOpen) {
                this.close();
            } else {
                this.open();
            }
        }

        open() {
            this.isOpen = true;
            this.popup.classList.add('open');
            this.popup.classList.remove('closing');
            if (this.btn) this.btn.classList.add('open');
            this.input.focus();
            this.scrollToBottom();
        }

        close() {
            this.isOpen = false;
            this.popup.classList.remove('open');
            this.popup.classList.add('closing');
            if (this.btn) this.btn.classList.remove('open');
            
            setTimeout(() => {
                this.popup.classList.remove('closing');
            }, 300);
        }

        resizeTextarea() {
            this.input.style.height = 'auto';
            this.input.style.height = Math.min(this.input.scrollHeight, 100) + 'px';
        }

        scrollToBottom() {
            setTimeout(() => {
                this.messagesContainer.scrollTop = this.messagesContainer.scrollHeight;
            }, 0);
        }

        addMessage(text, sender = 'user') {
            const msgRow = document.createElement('div');
            msgRow.className = `floating-msg-row ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = `floating-bubble ${sender}`;
            bubble.textContent = text;
            
            msgRow.appendChild(bubble);
            this.messagesContainer.appendChild(msgRow);
            
            // Remove empty state on first message
            const emptyState = this.messagesContainer.querySelector('.floating-chat-empty');
            if (emptyState) {
                emptyState.remove();
            }
            
            this.scrollToBottom();
        }

        async sendMessage() {
            const message = this.input.value.trim();
            
            if (!message) return;

            // Add user message to UI
            this.addMessage(message, 'user');
            this.input.value = '';
            this.input.style.height = 'auto';

            // Disable send button
            this.sendBtn.disabled = true;
            this.sendBtn.classList.add('loading');

            try {
                // Send message to Django backend
                const response = await fetch('/chatbot/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': this.getCsrfToken(),
                    },
                    body: `message=${encodeURIComponent(message)}`
                });

                const html = await response.text();

                // Parse response to extract bot message
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const botMessages = doc.querySelectorAll('.msg-row.bot .bubble.bot');

                if (botMessages.length > 0) {
                    // Get the last bot message (most recent)
                    const lastBotMessage = botMessages[botMessages.length - 1];
                    const botText = lastBotMessage.textContent.trim();
                    
                    if (botText) {
                        this.addMessage(botText, 'bot');
                    }
                }
            } catch (error) {
                console.error('Error sending message:', error);
                this.addMessage('Oups! Erreur de communication. Réessaye stp.', 'bot');
            } finally {
                // Re-enable send button
                this.sendBtn.disabled = false;
                this.sendBtn.classList.remove('loading');
                this.input.focus();
            }
        }

        getCsrfToken() {
            const name = 'csrftoken';
            let cookieValue = null;
            
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            
            return cookieValue;
        }
    }

    // Initialize when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
        window.appChatbot = new FloatingChatbot();
    });
</script>
