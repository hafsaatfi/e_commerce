<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">MonShop</a>

        <div>
            <a class="btn btn-light" href="/produits/">Produits</a>
            <a class="btn btn-warning" href="/panier/">Panier</a>

            {% if user.is_authenticated %}
                <a class="btn btn-danger" href="/logout/">Logout</a>
            {% else %}
                <a class="btn btn-success" href="/users/login/">Login</a>
                <a class="btn btn-info" href="/users/register/">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
