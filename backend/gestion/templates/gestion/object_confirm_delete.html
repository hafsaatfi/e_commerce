{% extends 'gestion/base_gestion.html' %}

{% block gestion_title %}Suppression - {{ label }}{% endblock %}

{% block gestion_content %}
<div class="max-w-2xl mx-auto bg-white rounded-3xl border border-red-200 p-6 lg:p-8">
    <h4 class="noto-serif text-2xl text-red-700 mb-3">Confirmer la suppression</h4>
    <p class="text-sm">Voulez-vous vraiment supprimer cet enregistrement de type <strong>{{ label }}</strong> ?</p>
    <p class="text-xs text-on-surface-variant mt-2 break-words">{{ object }}</p>

    <form method="post" class="mt-6">
        {% csrf_token %}
        <div class="flex gap-2">
            <button type="submit" class="px-4 py-2 rounded-xl bg-red-600 text-white text-xs font-bold uppercase tracking-widest">Oui, supprimer</button>
            <a href="{% url 'gestion:entity_detail' entity object.pk %}" class="px-4 py-2 rounded-xl border border-outline-variant/40 text-xs font-bold uppercase tracking-widest">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
